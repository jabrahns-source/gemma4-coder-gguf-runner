# ═══════════════════════════════════════════════════════════════════════════════
# Gemma 4 12B Coder — Server Configuration
# ═══════════════════════════════════════════════════════════════════════════════
# Override any of these by setting environment variables before running start-server.sh

# Path to llama-server binary
# LLAMA_SERVER=/usr/local/bin/llama-server

# Model file (auto-detected if not set)
# MODEL_FILE=/path/to/model.gguf

# Network
HOST=0.0.0.0
PORT=18080

# Context length — Gemma 4 supports up to 256K (262144)
# Adjust based on your VRAM (see README cheat sheet)
CTX_SIZE=16384

# GPU offloading: 99 = all layers, 0 = CPU only
N_GPU_LAYERS=99

# Sampling parameters (recommended for this model)
TEMP=1.0
TOP_P=0.95
TOP_K=64

# KV cache quantization — q8_0 is default; use q4_0 for ~2x more context
CACHE_TYPE_K=q8_0
CACHE_TYPE_V=q8_0

# Batch sizes
BATCH_SIZE=2048
UBATCH_SIZE=512

# Enable Gemma 4 native thinking mode (chain-of-thought)
ENABLE_THINKING=true

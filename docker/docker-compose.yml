version: "3.8"

services:
  gemma4-coder:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: gemma4-coder:latest
    container_name: gemma4-coder
    restart: unless-stopped
    ports:
      - "18080:18080"
    volumes:
      - ../models:/app/models:ro
    environment:
      - CTX_SIZE=16384
      - N_GPU_LAYERS=99
      - TEMP=1.0
      - TOP_P=0.95
      - TOP_K=64
      - CACHE_TYPE_K=q8_0
      - CACHE_TYPE_V=q8_0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
